<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Site Planner — Famous Brands</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0a08;
    --bg-1: #131210;
    --bg-2: #1a1815;
    --bg-3: #221f1b;
    --line: #2a2622;
    --line-2: #3a3530;
    --ink: #f5f0e8;
    --ink-2: #c9c0b4;
    --ink-3: #8a8278;
    --ink-4: #5a534b;
    --accent: #f5a524;        /* Famous Brands amber */
    --accent-2: #ff7a1a;      /* warmer / Steers */
    --accent-ink: #1a1208;
    --good: #6dd58c;
    --warn: #f0b429;
    --bad:  #ef6a5e;
    --map-bg: #0e1318;
    --map-block: #1a2028;
    --map-block-2: #232a33;
    --map-road: #3a4452;
    --map-road-major: #5a6678;
    --map-park: #1c2a22;
    --map-water: #14222e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: "Geist", -apple-system, sans-serif; -webkit-font-smoothing: antialiased; font-feature-settings: "ss01", "cv11"; overflow: hidden; }
  button { font-family: inherit; color: inherit; }
  input, select, textarea { font-family: inherit; }
  .mono { font-family: "Geist Mono", ui-monospace, monospace; font-feature-settings: "ss01"; }
  .serif { font-family: "Instrument Serif", serif; font-weight: 400; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="map.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="assistant.jsx"></script>
<script type="text/babel" src="detail.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
